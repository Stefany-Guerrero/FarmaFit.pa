<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FarmaFit | Registro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-body">
  <div class="login-container">
    <img src="img/FarmaFitv3.png" alt="FarmaFit" class="login-logo">
    <h2>Crear cuenta</h2>
    
    <form class="login-form" id="register-form">
      <input type="text" id="reg-name" placeholder="Nombre completo" required>
      <input type="email" id="reg-email" placeholder="Correo electrónico" required>
      <input type="password" id="reg-password" placeholder="Contraseña" required>
      <input type="password" id="reg-confirm" placeholder="Confirmar contraseña" required>
      <button type="submit" class="btn">Registrarse</button>
    </form>
    
    <div class="login-options">
      <a href="index.html">Ya tengo cuenta</a>
    </div>
  </div>

  <script>
    document.getElementById('register-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      var name = document.getElementById('reg-name').value;
      var email = document.getElementById('reg-email').value;
      var pass = document.getElementById('reg-password').value;
      var confirm = document.getElementById('reg-confirm').value;
      
      if (pass !== confirm) {
        alert('Las contraseñas no coinciden');
        return;
      }
      
      // Guardar usuario
      localStorage.setItem('usuario', JSON.stringify({
        nombre: name,
        email: email,
        password: pass
      }));
      
      alert('Registro exitoso. Por favor inicia sesión.');
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
